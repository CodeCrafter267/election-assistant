<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>Election Assistant</h1>
        </header>
        
        <main class="chat-area" id="chat-area">
            <div class="message assistant-message">
                <div class="avatar assistant-avatar">EA</div>
                <div class="message-content">
                    Hello! I'm your Election Assistant. How can I help you understand the election process today? You can ask me about registration, timelines, or polling locations.
                </div>
            </div>
        </main>

        <footer class="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Message Election Assistant..." autocomplete="off" autofocus>
                    <button type="submit" id="send-btn" aria-label="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>
                <div class="footer-text">Election Assistant can make mistakes. Check important info.</div>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
