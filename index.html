<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>Election Assistant</h1>
                <p>Your guide to the election process</p>
            </div>
        </header>
        
        <main class="chat-area" id="chat-area">
            <!-- Messages will appear here -->
            <div class="message assistant-message">
                <div class="message-content">
                    Hello! I'm your Election Assistant. How can I help you understand the election process today? You can ask me about registration, timelines, or polling locations.
                </div>
            </div>
        </main>

        <footer class="input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off" required>
                <button type="submit" id="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
